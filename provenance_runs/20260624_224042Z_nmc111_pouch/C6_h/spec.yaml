_meta:
  cell_type: pouch
  design_intent: "3.0 Ah NMC111/Graphite laboratory pouch cell for research validation"

geometry:
  cathode_height_mm: 60.0
  cathode_width_mm: 45.0
  anode_offset_mm: 1.5
  separator_offset_mm: 2.0

stack_config:
  num_stacks: 1
  electrode_pairs_per_stack: 18
  end_electrode_config: "BothNegative"
  separator_overwraps: 1

electrochemistry:
  cathode:
    material_name: "NMC111"
    loading_mg_cm2: 16.0
    rev_spec_capacity_mahg: 160.0
    collector_thickness_um: 15.0
    coating_thickness_0pct_um: 60.0
    coating_thickness_100pct_um: 62.0
    porosity_pct: 30.0
  anode:
    material_name: "Graphite"
    loading_mg_cm2: 7.76
    rev_spec_capacity_mahg: 350.0
    collector_thickness_um: 8.0
    coating_thickness_0pct_um: 50.0
    coating_thickness_100pct_um: 53.0
    porosity_pct: 35.0
    np_ratio: 1.10
  separator:
    material_name: "PP"
    thickness_um: 16.0
    porosity_pct: 40.0
    areal_weight_mgcm2: 1.5
  electrolyte:
    material_name: "LiPF6 in EC:DMC:EMC"
    density_g_cm3: 1.2
    excess_factor: 1.15

tabs:
  cathode:
    material: "Aluminum"
    height_mm: 15.0
    width_mm: 20.0
    thickness_mm: 0.2
  anode:
    material: "Copper"
    height_mm: 15.0
    width_mm: 20.0
    thickness_mm: 0.15

packaging:
  pouch_thickness_mm: 0.07
  offset_top_mm: 10.0
  offset_bottom_mm: 5.0
  offset_sides_mm: 5.0