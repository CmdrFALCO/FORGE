    "case_youngs_modulus_gpa",
  ]

electrical_properties:
  status: "PHASE 2 - PLACEHOLDER"
  description: "Electronic & ionic conductivity, contact resistances"
  parameters: [
    "cathode_electronic_conductivity_s_m",
    "anode_electronic_conductivity_s_m",
    "separator_effective_conductivity_s_m",
    "electrolyte_ionic_conductivity_s_m",
  ]

# ===========================================================================
# VALIDATION RULES (Constraints)
# ===========================================================================
# CellCAD enforces these constraints during calculation

_validation:
  geometry_fit:
    - "cathode_height_mm < cell_height_mm - wall_top_mm - wall_bottom_mm"
    - "cathode_width_mm + 2*anode_offset < cell_width_mm - 2*wall_sides_mm"
    - "stack_thickness_dry_mm < cell_thickness_mm - 2*wall_front_back_mm"

  electrochemistry:
    - "np_ratio >= 1.05  # Prevent lithium plating"
    - "np_ratio <= 1.50  # Reasonable upper bound"
    - "cathode_loading_mg_cm2 < 30.0  # Manufacturing limit"
    - "anode_loading_mg_cm2 < 20.0  # Manufacturing limit"

  stack_configuration:
    - "num_stacks * electrode_pairs_per_stack > 0  # At least one electrode pair"
    - "num_stacks <= 4  # Practical manufacturing limit"
    - "electrode_pairs_per_stack <= 100  # Practical limit"

# ===========================================================================
# DEFAULTS REFERENCE
# ===========================================================================
# All default values are based on V1 Prismatic reference cell (validated design)

_defaults_source:
  cell_reference: "V1 Prismatic"
  source_file: "V1_Prismatic_Reference_Data.md"
  validation_status: "VALIDATED"
  reference_outputs:
    capacity_ah: 120.866
    energy_wh: 440.467
    gravimetric_energy_density_wh_kg: 261.151
    volumetric_energy_density_wh_l: 629.292
    cell_mass_g: 1686.64

