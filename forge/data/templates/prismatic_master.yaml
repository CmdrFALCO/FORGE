  description: "Anisotropic thermal conductivity for all materials"
  parameters: [
    "cathode_k_inplane_w_mk",
    "cathode_k_throughplane_w_mk",
    "anode_k_inplane_w_mk",
    "anode_k_throughplane_w_mk",
    "separator_k_inplane_w_mk",
