site_name: FORGE Documentation
site_description: Formal Output Regulation for Generative Engineering
site_url: https://cmdrfalco.github.io/FORGE/
repo_url: https://github.com/CmdrFALCO/FORGE
repo_name: CmdrFALCO/FORGE

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Engine: engine.md
  - AXIOM: axiom.md
  - OpenAI Build Week: openai-build-week.md
  - ML Layer: ml-layer.md
  - API Reference: api-reference.md
  - Development: development.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

exclude_docs: |
  _temp/
