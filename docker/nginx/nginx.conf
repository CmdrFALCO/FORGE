# nginx.conf — Tier 2: static landing + Streamlit + FastAPI backends
# Based on nginx-http-only.conf

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=static_limit:10m rate=30r/s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    server {
        listen 80;
        server_name forge.cristian-leu.de;

        # Certbot challenge — NO auth
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Landing page (static)
        location / {
            auth_basic "FORGE Preview";
            auth_basic_user_file /etc/nginx/.htpasswd;
            limit_req zone=static_limit burst=20 nodelay;
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # Streamlit static assets (JS/CSS/fonts — high burst needed for initial page load)
        location /app/static/ {
            auth_basic "FORGE Preview";
            auth_basic_user_file /etc/nginx/.htpasswd;
            limit_req zone=static_limit burst=60 nodelay;

            proxy_pass http://streamlit:8501/app/static/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Streamlit app
        location /app/ {
            auth_basic "FORGE Preview";
            auth_basic_user_file /etc/nginx/.htpasswd;
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://streamlit:8501/app/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Streamlit internal routes (healthcheck, static assets, stream)
        location /app/_stcore/ {
            auth_basic "FORGE Preview";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://streamlit:8501/app/_stcore/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # FastAPI
        location /api/ {
            auth_basic "FORGE Preview";
            auth_basic_user_file /etc/nginx/.htpasswd;
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://api:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
